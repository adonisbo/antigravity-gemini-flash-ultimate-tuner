name: Validate Skills & Project

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # 允许手动触发
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1：验证所有 SKILL.md 格式合规
  # ────────────────────────────────────────────────────────────
  validate-skills:
    name: 🔍 Validate SKILL.md Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required skills exist
        run: |
          echo "📂 检查必须存在的 Skill 目录和文件..."
          REQUIRED_SKILLS=(
            "Best-Practice-Researcher"
            "Architect-Dialogue"
            "Code-Reviewer-Debugger"
            "Tester"
            "Tuner-Update"
          )
          ALL_OK=true
          for skill in "${REQUIRED_SKILLS[@]}"; do
            SKILL_PATH=".agent/skills/${skill}/SKILL.md"
            if [ -f "$SKILL_PATH" ]; then
              echo "  ✅ ${skill}"
            else
              echo "  ❌ 缺失：${SKILL_PATH}"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = false ]; then
            echo ""
            echo "❌ 有 Skill 文件缺失，请检查 .agent/skills/ 目录结构"
            exit 1
          fi
          echo ""
          echo "✅ 所有必须 Skill 文件存在"

      - name: Validate SKILL.md frontmatter (name + description)
        run: |
          echo "📋 验证 SKILL.md 包含必要的 YAML frontmatter..."
          SKILLS_DIR=".agent/skills"
          ALL_OK=true
          for skill_dir in "$SKILLS_DIR"/*/; do
            skill_name=$(basename "$skill_dir")
            skill_file="${skill_dir}SKILL.md"
            if [ ! -f "$skill_file" ]; then
              continue
            fi
            # 检查是否包含 name: 字段
            if ! grep -q "^name:" "$skill_file"; then
              echo "  ❌ ${skill_name}/SKILL.md 缺少 'name:' 字段"
              ALL_OK=false
            else
              name_val=$(grep "^name:" "$skill_file" | head -1)
              echo "  ✅ ${skill_name} → ${name_val}"
            fi
            # 检查是否包含 description: 字段
            if ! grep -q "^description:" "$skill_file"; then
              echo "  ❌ ${skill_name}/SKILL.md 缺少 'description:' 字段"
              ALL_OK=false
            fi
            # 检查文件大小（至少 200 字节，防止空文件）
            file_size=$(wc -c < "$skill_file")
            if [ "$file_size" -lt 200 ]; then
              echo "  ⚠️  ${skill_name}/SKILL.md 内容过少（${file_size} bytes），可能不完整"
            fi
          done
          if [ "$ALL_OK" = false ]; then
            echo ""
            echo "❌ 存在格式不合规的 SKILL.md 文件"
            exit 1
          fi
          echo ""
          echo "✅ 所有 SKILL.md 格式验证通过"

      - name: Validate GEMINI.md exists and has core rules
        run: |
          echo "📋 验证 GEMINI.md 存在并包含核心规则..."
          if [ ! -f "GEMINI.md" ]; then
            echo "❌ GEMINI.md 不存在！"
            exit 1
          fi
          # 检查核心关键词
          KEYWORDS=(
            "Best-Practice-Researcher"
            "Architect-Dialogue"
            "reflection"
            "hallucination"
          )
          ALL_OK=true
          for kw in "${KEYWORDS[@]}"; do
            if grep -qi "$kw" "GEMINI.md"; then
              echo "  ✅ 包含关键词：${kw}"
            else
              echo "  ❌ 缺少关键词：${kw}"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = false ]; then
            echo ""
            echo "❌ GEMINI.md 内容不完整，缺少核心规则关键词"
            exit 1
          fi
          echo ""
          echo "✅ GEMINI.md 验证通过"

  # ────────────────────────────────────────────────────────────
  # Job 2：验证 setup.bat 和 setup.sh 存在
  # ────────────────────────────────────────────────────────────
  validate-scripts:
    name: 📦 Validate Install Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check install scripts exist
        run: |
          echo "🔧 检查安装脚本..."
          FILES=("setup.bat" "setup.sh" "npx-install.js" "conflict-check.ps1")
          ALL_OK=true
          for f in "${FILES[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✅ ${f}"
            else
              echo "  ❌ 缺失：${f}"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = false ]; then
            exit 1
          fi

      - name: Validate setup.sh syntax
        run: |
          echo "🔍 检查 setup.sh 语法..."
          bash -n setup.sh && echo "✅ setup.sh 语法正确" || (echo "❌ setup.sh 语法错误" && exit 1)

      - name: Validate npx-install.js syntax
        run: |
          echo "🔍 检查 npx-install.js 语法..."
          node --check npx-install.js && echo "✅ npx-install.js 语法正确" || (echo "❌ npx-install.js 语法错误" && exit 1)

  # ────────────────────────────────────────────────────────────
  # Job 3：运行示例项目测试
  # ────────────────────────────────────────────────────────────
  test-sample-project:
    name: 🧪 Test Sample Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install sample project dependencies
        working-directory: sample_project
        run: |
          uv sync --extra dev

      - name: Run pytest
        working-directory: sample_project
        run: |
          uv run pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: sample_project/coverage.xml

  # ────────────────────────────────────────────────────────────
  # Job 4：README 完整性检查
  # ────────────────────────────────────────────────────────────
  validate-readme:
    name: 📖 Validate README
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check README sections
        run: |
          echo "📋 检查 README.md 必要章节..."
          SECTIONS=(
            "调教原理"
            "快速安装"
            "Skills 说明"
            "更新日志"
          )
          ALL_OK=true
          for section in "${SECTIONS[@]}"; do
            if grep -q "$section" README.md; then
              echo "  ✅ 包含章节：${section}"
            else
              echo "  ❌ 缺少章节：${section}"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = false ]; then
            exit 1
          fi
          echo ""
          echo "✅ README.md 完整性验证通过"
